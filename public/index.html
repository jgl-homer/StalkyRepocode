<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskify: Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* [MISMO CSS CYBERPUNK DE index.html AQUÍ] */
    :root {
      /* ... */
    }

    body {
      /* ... */
    }

    .container {
      max-width: 400px;
      /* Más pequeño para login */
      /* ... */
    }

    /* ... (Copiar todo el bloque <style> de index.html) ... */
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>

<body>
  <div class="container">
    <h1>LOGIN // ACCESO AL SISTEMA</h1>
    <div id="error-message" style="color: #FF5733; margin-bottom: 15px;"></div>

    <input type="email" id="email" placeholder="[ Correo Electrónico ]" class="input-field">
    <input type="password" id="password" placeholder="[ Contraseña ]" class="input-field" style="margin-top: 15px;">

    <button onclick="iniciarSesion()" style="margin-top: 25px;">INICIAR SESIÓN</button>
    <button onclick="window.location.href='register.html';"
      style="margin-top: 15px; background-color: #00FFFF; color: black;">REGISTRARSE</button>
  </div>

  <script>
    // TUS CREDENCIALES COMPLETAS (el mismo bloque que en index.html)
    const firebaseConfig = { /* ... */ };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = app.auth();

    // Redireccionar si ya está logueado
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'index.html';
      }
    });

    function mostrarError(mensaje) {
      document.getElementById('error-message').textContent = mensaje;
    }

    async function iniciarSesion() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      mostrarError('');

      try {
        await auth.signInWithEmailAndPassword(email, password);
        // La redirección a index.html ocurre en el onAuthStateChanged
      } catch (error) {
        console.error(error);
        mostrarError('Error de Login: ' + error.message);
      }
    }
  </script>
</body>

</html>
