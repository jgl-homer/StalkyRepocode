# Archivo: pubspec.yaml

name: stalky # Nombre de la aplicación: Stalky
description: "App Flutter con login usando Firebase"
publish_to: 'none'

version: 1.0.0+1

environment:
  # Se ajustó el SDK a una versión estándar y moderna de Dart.
  # Revisa tu versión de Dart instalada si hay problemas.
  sdk: ">=3.0.0 <4.0.0" 

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.3
  firebase_messaging: ^16.0.0
  image_picker: ^1.2.0

  # 🚀 NUEVOS: Para Notificaciones Locales y Fechas 🚀
  flutter_local_notifications: ^19.5.0 
  timezone: ^0.10.1 
  firebase_app_check: ^0.4.1+1
  intl: ^0.20.2 # Necesario para el formato de fecha/hora en dashboard.dart
  flutter_rating_bar: ^4.0.1
  diacritic: ^0.1.6
  audioplayers: ^6.5.1
  google_fonts: ^6.2.1
  device_preview: ^1.3.1
  shared_preferences: ^2.2.3

  # Gemini and MCP Integration
  dart_mcp: 0.5.1
  stream_channel: ^2.1.2
  google_generative_ai: ^0.4.6
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # 🖼️ SECCIÓN DE ASSETS: DESCOMENTADA Y CONFIGURADA
  # Esta línea es CLAVE para que Flutter encuentre tu logo en dashboard.dart
  assets:
    - secrets.json
    - assets/logo/
    - assets/sounds/

flutter_icons:
  android: true
  ios: true
  # 🔑 Ruta del ícono para el lanzador (Icono principal de la app)
  image_path: "assets/icon/icon.png"
