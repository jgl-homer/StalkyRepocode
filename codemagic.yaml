workflows:
ios-release:
name: iOS Release
instance_type: mac_mini_m2

environment:
  flutter: stable
  xcode: latest

cache:
  cache_paths:
    - ~/.pub-cache
    - ~/Library/Caches/CocoaPods

scripts:
  - name: Flutter Clean
    script: |
      flutter clean

  - name: Flutter Pub Get
    script: |
      flutter pub get

  - name: Verify iOS Target
    script: |
      grep -R "IPHONEOS_DEPLOYMENT_TARGET" ios || true
      grep -R "15.0" ios || true

  - name: Build iOS
    script: |
      flutter build ios --release --no-codesign

artifacts:
  - build/ios/iphoneos/*.app
  - build/ios/archive/*.xcarchive
